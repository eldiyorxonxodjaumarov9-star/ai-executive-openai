services:
  - type: web
    name: ai-executive-platform
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: AI_PROVIDER
        value: openai
      - key: BITRIX24_WEBHOOK_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "1200"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DAILY_REPORT_ENABLED
        value: false
      - key: CLAUDE_MAX_TOKENS
        value: "4096"
      - key: CLAUDE_TIMEOUT_SECONDS
        value: "480"
      - key: CLAUDE_MAX_RETRIES
        value: "2"
      - key: BITRIX_TIMEOUT_SECONDS
        value: "30"
      - key: BITRIX_MAX_RETRIES
        value: "2"
      - key: CONNECTOR_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DAILY_REPORT_TIMEZONE
        value: Asia/Tashkent
      - key: DAILY_REPORT_AGENT
        value: ceo
      # Legacy Claude (optional — only if AI_PROVIDER=claude)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
