<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahbarlik AI — Web Chat</title>
  <link rel="stylesheet" href="/public/dashboard/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Rahbarlik AI</h1>
        <p class="muted">AI Executive Platform</p>
      </div>
      <span id="status-badge" class="badge">…</span>

      <nav id="agent-list" class="agent-list" aria-label="Agentlar"></nav>

      <details class="settings">
        <summary>Sozlamalar</summary>
        <label for="connector-secret">Ulanish kaliti</label>
        <input id="connector-secret" type="password" autocomplete="off" placeholder="CONNECTOR_SECRET (ixtiyoriy)">
        <button type="button" id="save-secret" class="btn secondary">Saqlash</button>
      </details>

      <button type="button" id="clear-chat" class="btn secondary">Chatni tozalash</button>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <h2 id="active-agent-label">Bosh direktor agenti</h2>
        <p class="muted">Oddiy savol → tez javob. To'liq hisobot uchun tugmani bosing.</p>
      </header>

      <section id="chat-messages" class="messages" aria-live="polite"></section>

      <div id="loading" class="loading hidden">
        <span class="spinner"></span>
        <span id="loading-text">Javob tayyorlanmoqda...</span>
      </div>
      <div id="error" class="error hidden" role="alert"></div>

      <footer class="composer">
        <textarea id="message-input" placeholder="Savolingizni yozing... Masalan: Leadlar nechta?" rows="3"></textarea>
        <div class="composer-actions">
          <button type="button" id="send-btn" class="btn primary">So'rash</button>
          <button type="button" id="full-report-btn" class="btn outline">To'liq hisobot</button>
        </div>
      </footer>

      <div id="export-bar" class="export-bar hidden">
        <button type="button" id="copy-btn" class="btn secondary small">Nusxalash</button>
        <button type="button" class="btn secondary small" disabled title="Tez orada">PDF</button>
        <button type="button" class="btn secondary small" disabled title="Tez orada">DOCX</button>
      </div>
    </main>
  </div>
  <script src="/public/dashboard/app.js" defer></script>
</body>
</html>
