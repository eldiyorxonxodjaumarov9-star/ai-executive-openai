<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahbarlik AI platformasi</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #faf9f5;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 16px;
    }
    p {
      margin: 0 0 14px;
      font-size: 12px;
      color: #6b6b6b;
      line-height: 1.45;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #6b6b6b;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d9d7ce;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #c96442;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #eceae3;
      color: #1a1a1a;
    }
    #status {
      font-size: 12px;
      color: #2e7d32;
      min-height: 18px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #test-result {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow-y: auto;
    }
    #test-result.ok {
      display: block;
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }
    #test-result.err {
      display: block;
      background: #fdecea;
      color: #b42318;
      border: 1px solid #f5c6c0;
    }
    #update-instructions {
      display: none;
      margin: 8px 0;
      padding: 10px;
      background: #fff8e6;
      border: 1px solid #ffe08a;
      border-radius: 8px;
      font-size: 11px;
      color: #5c4a00;
      line-height: 1.45;
    }
    #update-instructions.visible { display: block; }
    .version {
      font-size: 11px;
      color: #9a9a9a;
      margin: 0 0 10px;
    }
    hr.divider {
      border: none;
      border-top: 1px solid #e8e6df;
      margin: 14px 0;
    }
    a {
      color: #c96442;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Rahbarlik AI platformasi</h1>
  <p class="version" id="popup-version">v2.1.0</p>
  <p>
    Render serverida CONNECTOR_SECRET sozlangan bo'lsa, kalit majburiy.
    Faqat brauzeringizda saqlanadi — Claude ga yuborilmaydi.
  </p>

  <label for="secret">Ulanish kaliti</label>
  <input type="password" id="secret" placeholder="Render CONNECTOR_SECRET qiymati" autocomplete="off">

  <button type="button" id="save">Saqlash</button>
  <button type="button" id="clear" class="secondary">Kalitni tozalash</button>
  <button type="button" id="test-backend" class="secondary">Serverni tekshirish</button>

  <hr class="divider">
  <button type="button" id="update-extension" class="secondary">Kengaytmani yangilash</button>
  <div id="update-instructions">
    Xavfsizlik sababli kengaytma o'z-o'zidan qayta yuklanmaydi.
    chrome://extensions sahifasida <strong>Qayta yuklash</strong> tugmasini bosing.
  </div>
  <button type="button" id="open-extensions" class="secondary" hidden>Kengaytmalar sahifasi</button>

  <div id="worker-status" style="font-size:11px;color:#6b6b6b;margin-bottom:6px;"></div>
  <div id="status"></div>
  <div id="test-result"></div>

  <p style="margin-top: 14px;">
    <a href="https://ai-executive-platform.onrender.com/health" target="_blank" rel="noopener">Server holati</a>
  </p>

  <script src="js/constants.js"></script>
  <script src="js/migrate.js"></script>
  <script src="js/secret-storage.js"></script>
  <script src="js/messaging.js"></script>
  <script src="js/errors.js"></script>
  <script src="popup.js"></script>
</body>
</html>
