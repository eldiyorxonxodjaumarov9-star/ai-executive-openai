<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Executive Platform</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #faf9f5;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 16px;
    }
    p {
      margin: 0 0 14px;
      font-size: 12px;
      color: #6b6b6b;
      line-height: 1.45;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #6b6b6b;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #d9d7ce;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #c96442;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button.secondary {
      background: #eceae3;
      color: #1a1a1a;
    }
    #status {
      font-size: 12px;
      color: #2e7d32;
      min-height: 18px;
    }
    a {
      color: #c96442;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>AI Executive Platform</h1>
  <p>
    Optional connector secret for protected backend API.
    Stored locally in your browser only — never sent to Claude.
  </p>

  <label for="secret">X-Connector-Secret (optional)</label>
  <input type="password" id="secret" placeholder="Leave empty if not configured" autocomplete="off">

  <button type="button" id="save">Save</button>
  <button type="button" id="clear" class="secondary">Clear secret</button>

  <div id="status"></div>

  <p style="margin-top: 14px;">
    <a href="https://ai-executive-platform-1.onrender.com/health" target="_blank" rel="noopener">Backend health</a>
  </p>

  <script src="popup.js"></script>
</body>
</html>
